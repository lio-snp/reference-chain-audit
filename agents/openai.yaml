version: 1
display_name: Reference Chain Audit
short_description: Agent-first skill for auditing reference evidence before final APA or GB/T cleanup.
default_prompt: Audit cited references end-to-end for a thesis or paper. Treat this as a skill-first workflow: the agent should drive the reasoning, use helper scripts only when they reduce work, and separate evidence-chain failures from style-only issues such as APA or GB/T 7714 formatting. Focus on existence, local claim relevance, and DOI or URL landing correctness.
